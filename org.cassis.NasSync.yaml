app-id: org.cassis.NasSync
runtime: org.gnome.Platform
runtime-version: "45"
sdk: org.gnome.Sdk
command: nas_sync_app.py
modules:
  - name: nas-sync
    buildsystem: simple
    build-commands:
      # Copie des scripts Python dans le répertoire d'exécution (/app/bin)
      - install -d /app/bin
      - install -m 755 nas_sync_app.py /app/bin/nas_sync_app.py
      - install -m 755 nas_sync_daemon.py /app/bin/nas_sync_daemon.py
      - install -m 644 nas_sync_config.py /app/bin/nas_sync_config.py
      - install -m 644 conflict_dialog.py /app/bin/conflict_dialog.py
      - install -m 644 first_run_wizard.py /app/bin/first_run_wizard.py
      
      # Installation de l'icône et du fichier desktop de l'application
      - install -d /app/share/applications
      - install -m 644 org.cassis.NasSync.desktop /app/share/applications/org.cassis.NasSync.desktop
    sources:
      - type: dir
        path: .

# Spécification des permissions du bac à sable (Permissions cruciales)
finish-args:
  # 1. Accès réseau pour joindre le NAS
  - --share=network
  
  # 2. Accès aux répertoires de travail de l'hôte (le cache local et le montage NAS)
  - --filesystem=~/offline_cache:create
  - --filesystem=~/NasShare:create
  
  # 3. Accès aux répertoires XDG standards pour les liens de redirection
  - --filesystem=xdg-desktop
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  - --filesystem=xdg-pictures
  - --filesystem=xdg-music
  - --filesystem=xdg-videos
  
  # 4. Communications D-Bus requises
  - --talk-name=org.freedesktop.Notifications     # Pour afficher les notifications
  - --talk-name=org.freedesktop.NetworkManager    # Pour surveiller le statut réseau metered
  - --talk-name=org.gtk.vfs.*                     # Si utilisation de GVfs pour le montage
  
  # 5. Intégration graphique et X11/Wayland
  - --socket=fallback-x11
  - --socket=wayland
